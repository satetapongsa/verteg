version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vertex_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exchange
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: vertex_backend
    restart: always
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/exchange?schema=public
      - JWT_ACCESS_SECRET=super_secret_access_key_991823!
      - JWT_REFRESH_SECRET=super_secret_refresh_key_882231!
      - CORS_ORIGIN=http://localhost
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: vertex_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost/api
      - VITE_WS_URL=ws://localhost/ws

volumes:
  pgdata:
